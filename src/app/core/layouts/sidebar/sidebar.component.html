<!-- Overlay backdrop (mobile only) -->
<div *ngIf="mobileOpen" class="lg:hidden fixed inset-0 bg-black/50 z-30 transition-opacity duration-300"
  (click)="toggleMobile()" aria-hidden="true"></div>

<!-- SIDEBAR Responsive (Mobile-First) -->
<aside
  class="fixed inset-y-0 left-0 w-64 z-40 flex flex-col bg-gradient-to-r from-[#FF6B00] to-[#FF914D] text-white shadow-xl transform -translate-x-full transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 lg:w-[240px] lg:h-[calc(100vh-2rem)] lg:m-4 lg:rounded-xl lg:shadow-md"
  [class.translate-x-0]="mobileOpen" role="navigation" aria-label="Sidebar navigation">

  <!-- Close button (mobile only) -->
  <div class="lg:hidden p-3 flex justify-end">
    <button (click)="toggleMobile()" class="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Close menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <!-- Logo -->
  <div class="px-3 pb-4 lg:pt-2">
    <div class="bg-white rounded-xl px-4 py-3 sm:px-6 sm:py-6 ">
      <img src="images/logo.png" alt="coop achat" class="w-full h-auto object-contain">
    </div>
  </div>

  <!-- Menu -->
  <nav class="flex-1 px-2 py-2 overflow-auto sm:px-3 lg:pr-1 lg:pl-2">
    <ul class="space-y-2 md:space-y-3 lg:space-y-4">
      <li *ngFor="let item of filteredMenuItems">
        <a [routerLink]="item.link" (click)="mobileOpen && toggleMobile()"
          class="group flex items-center gap-2 px-3 py-2 sm:gap-3 sm:px-4 sm:py-2.5 lg:py-3 transition-all duration-150 w-full rounded-md"
          [ngClass]="{ 
            'opacity-100': item.active,
            'opacity-60 hover:opacity-100': !item.active
          }" [style.background-color]="item.active ? '#FFFFFF1A' : 'transparent'"
          [attr.aria-current]="item.active ? 'page' : null">

          <!-- SVG Icon -->
          <ng-container [ngSwitch]="item.icon">

            <!-- Dashboard -->
