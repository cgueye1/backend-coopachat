<!-- HAMBURGER pour mobile (visible < lg) -->
<button class="lg:hidden fixed top-4 left-4 z-40 w-10 h-10 bg-white rounded-lg shadow flex items-center justify-center"
  (click)="toggleMobile()" aria-label="Ouvrir le menu">
  <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect y="0" width="20" height="2" rx="1" fill="#111827" />
    <rect y="6" width="20" height="2" rx="1" fill="#111827" />
    <rect y="12" width="20" height="2" rx="1" fill="#111827" />
  </svg>
</button>

<!-- SIDEBAR Desktop (lg and up) -->
<aside
  class="hidden lg:flex w-[240px] flex-col bg-gradient-to-r from-[#FF6B00] to-[#FF914D] text-white fixed left-4 top-4 bottom-4 z-20 rounded-xl shadow-md"
  role="navigation" aria-label="Sidebar navigation">
  
  <!-- Logo -->
  <div class="px-5 pt-5 pb-4">
    <div class="bg-white rounded-xl px-4 py-3 inline-block">
      <img src="images/logo.png" alt="coop achat" class="w-[150px] h-auto object-contain">
    </div>
  </div>
  
  <!-- Menu -->
  <nav class="flex-1 pr-1 pl-2 py-2 overflow-auto">

      <li *ngFor="let item of filteredMenuItems">

          class="group flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all duration-150 w-full"

            'bg-green/10 rounded-lg opacity-100': item.active,
            'opacity-60 hover:opacity-100': !item.active
          }" 
          [attr.aria-current]="item.active ? 'page' : null">

          <!-- SVG Icon -->

  <!-- Profile -->
  <div class="px-4 pb-4 pt-3 mt-auto border-t border-white/10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gray-300 border-2 border-white overflow-hidden shrink-0">
        <img src="images/profile.jpg" alt="Profile" class="w-full h-full object-cover" onerror="this.style.display='none'">
      </div>

      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium tracking-tight leading-snug truncate">Mohamed Ndiaye</div>
        <div class="text-xs text-white/70 tracking-tight leading-tight truncate">{{ roleLabel }}</div>
      </div>

      <button class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" (click)="toggleUserMenu()" aria-label="Menu utilisateur">
        <svg width="16" height="16" viewBox="0 0 19 18" fill="none" xmlns="http://www.w3.org/2000/svg" class="opacity-80">
          <path
            d="M2.61575 18C2.06575 18 1.59509 17.8043 1.20375 17.413C0.81242 17.0217 0.61642 16.5507 0.615753 16V2C0.615753 1.45 0.811753 0.979333 1.20375 0.588C1.59575 0.196667 2.06642 0.000666667 2.61575 0H9.61575V2H2.61575V16H9.61575V18H2.61575ZM13.6158 14L12.2408 12.55L14.7908 10H6.61575V8H14.7908L12.2408 5.45L13.6158 4L18.6158 9L13.6158 14Z"
            fill="white" />
        </svg>
      </button>
    </div>

    <!-- User Menu Desktop -->
    <div *ngIf="userMenuOpen"
      class="absolute bottom-20 left-4 right-4 bg-white rounded-lg shadow-xl py-2 z-50">
      <button (click)="goToProfile()"
        class="w-full px-4 py-2.5 text-left text-sm text-gray-700 hover:bg-gray-100 transition-colors">
        Mon compte
      </button>
      <button (click)="logout()"
        class="w-full px-4 py-2.5 text-left text-sm text-red-600 hover:bg-red-50 transition-colors">
        Dconnexion
      </button>
    </div>
  </div>
</aside>

<!-- SIDEBAR Mobile (< lg) -->
<aside *ngIf="mobileOpen"
  class="lg:hidden fixed inset-0 z-30 bg-black/50"
  (click)="closeMobile()">
  <div class="w-64 h-full bg-gradient-to-r from-[#FF6B00] to-[#FF914D] text-white shadow-xl"
    (click)="$event.stopPropagation()">
    
    <!-- Close button -->
    <div class="p-4 flex justify-end">
      <button (click)="closeMobile()" class="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Fermer le menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <!-- Logo -->
    <div class="px-5 pb-4">
      <div class="bg-white rounded-xl px-4 py-3 inline-block">
        <img src="images/logo.png" alt="coop achat" class="w-[150px] h-auto object-contain">
      </div>
    </div>

    <!-- Menu Mobile -->
    <nav class="px-3 py-2 overflow-auto max-h-[calc(100vh-250px)]">
      <ul class="space-y-0.5">
        <li *ngFor="let item of filteredMenuItems">
          <a [href]="item.link" 
            (click)="closeMobile()"
            class="group flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all duration-150 w-full"
            [ngClass]="{ 
              'bg-white/10 opacity-100': item.active,
              'opacity-60 hover:opacity-100': !item.active
            }">
            <span class="text-sm font-medium tracking-tight leading-snug">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Profile Mobile -->
    <div class="absolute bottom-0 left-0 right-0 px-4 pb-4 pt-3 border-t border-white/10 bg-gradient-to-r from-[#FF6B00] to-[#FF914D]">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gray-300 border-2 border-white overflow-hidden shrink-0">
          <img src="images/profile.jpg" alt="Profile" class="w-full h-full object-cover" onerror="this.style.display='none'">
        </div>

        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium tracking-tight leading-snug truncate">Mohamed Ndiaye</div>
          <div class="text-xs text-white/70 tracking-tight leading-tight truncate">{{ roleLabel }}</div>
        </div>

        <button class="p-1.5 hover:bg-white/10 rounded-lg transition-colors" (click)="toggleUserMenuMobile()" aria-label="Menu utilisateur">
          <svg width="16" height="16" viewBox="0 0 19 18" fill="none" xmlns="http://www.w3.org/2000/svg" class="opacity-80">
            <path
              d="M2.61575 18C2.06575 18 1.59509 17.8043 1.20375 17.413C0.81242 17.0217 0.61642 16.5507 0.615753 16V2C0.615753 1.45 0.811753 0.979333 1.20375 0.588C1.59575 0.196667 2.06642 0.000666667 2.61575 0H9.61575V2H2.61575V16H9.61575V18H2.61575ZM13.6158 14L12.2408 12.55L14.7908 10H6.61575V8H14.7908L12.2408 5.45L13.6158 4L18.6158 9L13.6158 14Z"
              fill="white" />
          </svg>
        </button>
      </div>

      <!-- User Menu Mobile -->
      <div *ngIf="userMenuMobileOpen"
        class="mt-3 bg-white rounded-lg shadow-xl py-2">
        <button (click)="goToProfile()"
          class="w-full px-4 py-2.5 text-left text-sm text-gray-700 hover:bg-gray-100 transition-colors">
          Mon compte
        </button>
        <button (click)="logout()"
          class="w-full px-4 py-2.5 text-left text-sm text-red-600 hover:bg-red-50 transition-colors">
          Dconnexion
        </button>
      </div>
    </div>
  </div>
</aside>
