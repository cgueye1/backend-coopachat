<!-- Mobile hamburger intégré au header -->
<button
  class="lg:hidden fixed top-3 left-3 z-50 w-10 h-10 sm:top-4 sm:left-4 sm:w-11 sm:h-11 rounded-lg shadow-sm bg-white flex items-center justify-center hover:bg-gray-50 transition-colors"
  (click)="toggleMobileMenu()" aria-label="Toggle menu">
  <svg class="w-4 h-4 sm:w-[17px] sm:h-[14px]" viewBox="0 0 17 14" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path
      d="M15 0H1.25C0.918479 0 0.600537 0.131696 0.366116 0.366116C0.131696 0.600537 0 0.918479 0 1.25V12.5C0 12.8315 0.131696 13.1495 0.366116 13.3839C0.600537 13.6183 0.918479 13.75 1.25 13.75H15C15.3315 13.75 15.6495 13.6183 15.8839 13.3839C16.1183 13.1495 16.25 12.8315 16.25 12.5V1.25C16.25 0.918479 16.1183 0.600537 15.8839 0.366116C15.6495 0.131696 15.3315 0 15 0ZM1.25 8.75H2.5C2.66576 8.75 2.82473 8.68415 2.94194 8.56694C3.05915 8.44973 3.125 8.29076 3.125 8.125C3.125 7.95924 3.05915 7.80027 2.94194 7.68306C2.82473 7.56585 2.66576 7.5 2.5 7.5H1.25V6.25H2.5C2.66576 6.25 2.82473 6.18415 2.94194 6.06694C3.05915 5.94973 3.125 5.79076 3.125 5.625C3.125 5.45924 3.05915 5.30027 2.94194 5.18306C2.82473 5.06585 2.66576 5 2.5 5H1.25V3.75H2.5C2.66576 3.75 2.82473 3.68415 2.94194 3.56694C3.05915 3.44973 3.125 3.29076 3.125 3.125C3.125 2.95924 3.05915 2.80027 2.94194 2.68306C2.82473 2.56585 2.66576 2.5 2.5 2.5H1.25V1.25H4.375V12.5H1.25V8.75ZM15 12.5H5.625V1.25H15V12.5Z"
      fill="#1C1C1C" />
  </svg>
</button>

<!-- Back Type -->
<div *ngIf="type === 'back'" class="flex items-center gap-3 mb-3 pl-12 sm:gap-4 sm:mb-4 sm:pl-14 lg:pl-0 xl:mb-6">
  <button (click)="onActionClick()"
    class="w-10 h-10 sm:w-12 sm:h-12 lg:w-14 lg:h-14 bg-white rounded-md flex items-center justify-center transition-colors flex-shrink-0">
    <svg class="w-4 h-3 sm:w-[18px] sm:h-[14px]" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.75 6.75H0.75M0.75 6.75L6.75 0.75M0.75 6.75L6.75 12.75" stroke="#2B3674" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
  <div class="space-y-0.5 sm:space-y-1">
    <div *ngIf="breadcrumb" class="text-xs sm:text-sm text-[#707EAE] mb-0.5 sm:mb-1">{{ breadcrumb }}</div>
    <h1 *ngIf="title" class="text-lg font-bold text-[#2B3674] sm:text-xl lg:text-2xl">{{ title }}</h1>
  </div>
</div>

<!-- Filter & Simple Types -->
<div *ngIf="type !== 'back'"
  class="flex flex-col space-y-3 sm:space-y-4 sm:flex-row sm:items-center sm:justify-between sm:space-y-0 mb-3 sm:mb-4 pl-12 sm:pl-14 lg:pl-0 xl:mb-6">
  <!-- Breadcrumb & Title -->
  <div class="space-y-0.5 sm:space-y-1">
    <div *ngIf="breadcrumb" class="text-xs sm:text-sm text-[#707EAE] mb-0.5 sm:mb-1">{{ breadcrumb }}</div>
    <h1 *ngIf="title" class="text-lg font-bold text-[#2B3674] sm:text-xl lg:text-2xl xl:text-3xl">{{ title }}</h1>
  </div>

  <!-- Actions Area -->
  <div class="w-full sm:w-auto">

    <!-- Filter Type -->
    <div *ngIf="type === 'filter'" class="flex flex-col sm:flex-row sm:items-center sm:justify-end gap-2 sm:gap-3">
      <!-- Period Dropdown -->
      <div class="relative">
        <button (click)="togglePeriodDropdown()"
          class="px-4 py-3 sm:px-5 sm:py-3.5 lg:px-7 lg:py-4 border border-gray-300 rounded-full text-xs sm:text-sm bg-transparent focus:outline-none hover:bg-gray-50 transition-colors flex items-center justify-between gap-2 w-full sm:min-w-[180px] lg:min-w-[200px]">
          <span class="text-[#6B7280]">Période <span class="font-semibold text-[#333333]">{{ selectedPeriod
              }}</span></span>
          <svg class="w-3 h-3 sm:w-4 sm:h-4 transition-transform" [class.rotate-180]="isPeriodDropdownOpen" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        <div *ngIf="isPeriodDropdownOpen"
          class="absolute z-50 mt-2 w-full bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
          <button *ngFor="let option of periodOptions" (click)="selectPeriod(option)"
            class="w-full px-3 py-2 sm:px-4 sm:py-3 text-left text-xs sm:text-sm hover:bg-gray-50 transition-colors"
            [class.bg-gray-100]="option === selectedPeriod" [class.font-semibold]="option === selectedPeriod">
            {{ option }}
          </button>
        </div>
      </div>

      <!-- Supplier Dropdown -->
      <div *ngIf="showSupplierFilter" class="relative">
        <button (click)="toggleSupplierDropdown()"
          class="px-4 py-3 sm:px-5 sm:py-3.5 lg:px-7 lg:py-4 border border-gray-300 rounded-full text-xs sm:text-sm bg-transparent focus:outline-none hover:bg-gray-50 transition-colors flex items-center justify-between gap-2 w-full sm:min-w-[180px] lg:min-w-[200px]">
          <span class="text-[#6B7280]">{{ supplierLabel }} <span class="semifont-bold text-[#333333]">{{
              selectedSupplier
              }}</span></span>
          <svg class="w-3 h-3 sm:w-4 sm:h-4 transition-transform" [class.rotate-180]="isSupplierDropdownOpen"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        <div *ngIf="isSupplierDropdownOpen"
          class="absolute z-50 mt-2 w-full bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
          <button *ngFor="let option of supplierOptions" (click)="selectSupplier(option)"
            class="w-full px-3 py-2 sm:px-4 sm:py-3 text-left text-xs sm:text-sm hover:bg-gray-50 transition-colors"
            [class.bg-gray-100]="option === selectedSupplier" [class.font-semibold]="option === selectedSupplier">
            {{ option }}
          </button>
        </div>
      </div>

      <button
        class="bg-[#2C2D5B] text-white px-4 py-3 sm:px-4 sm:py-3.5 lg:px-4 lg:py-4 rounded-full text-xs sm:text-sm font-medium flex items-center justify-center hover:bg-indigo-800 transition-colors">
        <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-1.5 sm:mr-2" viewBox="0 0 20 20" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M6.66699 14.1667L10.0003 17.5M10.0003 17.5L13.3337 14.1667M10.0003 17.5V10M16.667 13.9524C17.6849 13.1117 18.3337 11.8399 18.3337 10.4167C18.3337 7.88536 16.2816 5.83333 13.7503 5.83333C13.5682 5.83333 13.3979 5.73833 13.3054 5.58145C12.2187 3.73736 10.2124 2.5 7.91699 2.5C4.46521 2.5 1.66699 5.29822 1.66699 8.75C1.66699 10.4718 2.3632 12.0309 3.48945 13.1613"
            stroke="white" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Exporter
      </button>
    </div>

    <!-- Simple Type -->
    <div *ngIf="type === 'simple'" class="flex flex-col sm:flex-row sm:items-center sm:justify-end gap-2 sm:gap-3">
      <button (click)="onActionClick()"
        class="bg-[#2C2D5B] text-white px-4 py-3 sm:px-5 sm:py-3.5 lg:px-6 lg:py-4 rounded-full text-xs sm:text-sm font-medium flex items-center justify-center gap-1.5 sm:gap-2 hover:bg-[#1a214d] transition-colors">
        <svg class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M10 18.75C5.175 18.75 1.25 14.825 1.25 10C1.25 5.175 5.175 1.25 10 1.25C14.825 1.25 18.75 5.175 18.75 10C18.75 14.825 14.825 18.75 10 18.75ZM10 2.5C5.8625 2.5 2.5 5.8625 2.5 10C2.5 14.1375 5.8625 17.5 10 17.5C14.1375 17.5 17.5 14.1375 17.5 10C17.5 5.8625 14.1375 2.5 10 2.5Z"
            fill="white" />
          <path
            d="M10 14.375C9.65 14.375 9.375 14.1 9.375 13.75V6.25C9.375 5.9 9.65 5.625 10 5.625C10.35 5.625 10.625 5.9 10.625 6.25V13.75C10.625 14.1 10.35 14.375 10 14.375Z"
            fill="white" />
          <path
            d="M13.75 10.625H6.25C5.9 10.625 5.625 10.35 5.625 10C5.625 9.65 5.9 9.375 6.25 9.375H13.75C14.1 9.375 14.375 9.65 14.375 10C14.375 10.35 14.1 10.625 13.75 10.625Z"
            fill="white" />
        </svg>
        {{ buttonLabel }}
      </button>
    </div>

  </div>
</div>
