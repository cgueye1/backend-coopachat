<!-- Back Type -->
<div *ngIf="type === 'back'" class="flex items-center gap-4 mb-4 2xl:mb-8">
  <button (click)="onActionClick()"
    class="w-12 h-12 bg-white rounded-md flex items-center justify-center transition-colors flex-shrink-0">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.75 6.75H0.75M0.75 6.75L6.75 0.75M0.75 6.75L6.75 12.75" stroke="#2B3674" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
  <div class="space-y-1">
    <div *ngIf="breadcrumb" class="text-sm text-[#707EAE] mb-1">{{ breadcrumb }}</div>
    <h1 *ngIf="title" class="text-2xl sm:text-3xl font-bold text-[#2B3674]">{{ title }}</h1>
  </div>
</div>

<!-- Filter & Simple Types -->
<div *ngIf="type !== 'back'"
  class="flex flex-col space-y-4 sm:flex-row sm:items-center sm:justify-between sm:space-y-0 mb-4 2xl:mb-8">
  <!-- Breadcrumb & Title -->
  <div class="space-y-1">
    <div *ngIf="breadcrumb" class="text-sm text-[#707EAE] mb-1">{{ breadcrumb }}</div>
    <h1 *ngIf="title" class="text-2xl sm:text-3xl font-bold text-[#2B3674]">{{ title }}</h1>
  </div>

  <!-- Actions Area -->
  <div class="w-full sm:w-auto">

    <!-- Filter Type -->
    <div *ngIf="type === 'filter'" class="flex flex-col sm:flex-row sm:items-center sm:justify-end gap-3">
      <select
        class="px-7 py-4 border border-gray-300 rounded-full text-sm bg-transparent focus:outline-none text-[#2B3674]">
        <option>Période: Cette année</option>
        <option>Ce mois</option>
        <option>Cette semaine</option>
      </select>
      <select
        class="px-7 py-4 border border-gray-300 rounded-full text-sm bg-transparent focus:outline-none text-[#2B3674]">
        <option>Fournisseurs: Tous</option>
      </select>

      <button
        class="bg-indigo-900 text-white px-4 py-4 rounded-full text-sm font-medium flex items-center justify-center hover:bg-indigo-800 transition-colors">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="mr-2">
          <path
            d="M6.66699 14.1667L10.0003 17.5M10.0003 17.5L13.3337 14.1667M10.0003 17.5V10M16.667 13.9524C17.6849 13.1117 18.3337 11.8399 18.3337 10.4167C18.3337 7.88536 16.2816 5.83333 13.7503 5.83333C13.5682 5.83333 13.3979 5.73833 13.3054 5.58145C12.2187 3.73736 10.2124 2.5 7.91699 2.5C4.46521 2.5 1.66699 5.29822 1.66699 8.75C1.66699 10.4718 2.3632 12.0309 3.48945 13.1613"
            stroke="white" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Exporter
      </button>
    </div>

    <!-- Simple Type -->
    <div *ngIf="type === 'simple'" class="flex flex-col sm:flex-row sm:items-center sm:justify-end gap-3">
      <button (click)="onActionClick()"
        class="bg-[#2B3674] text-white px-6 py-3 rounded-full text-sm font-medium flex items-center justify-center gap-2 hover:bg-[#1a214d] transition-colors">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M10 18.75C5.175 18.75 1.25 14.825 1.25 10C1.25 5.175 5.175 1.25 10 1.25C14.825 1.25 18.75 5.175 18.75 10C18.75 14.825 14.825 18.75 10 18.75ZM10 2.5C5.8625 2.5 2.5 5.8625 2.5 10C2.5 14.1375 5.8625 17.5 10 17.5C14.1375 17.5 17.5 14.1375 17.5 10C17.5 5.8625 14.1375 2.5 10 2.5Z"
            fill="white" />
          <path
            d="M10 14.375C9.65 14.375 9.375 14.1 9.375 13.75V6.25C9.375 5.9 9.65 5.625 10 5.625C10.35 5.625 10.625 5.9 10.625 6.25V13.75C10.625 14.1 10.35 14.375 10 14.375Z"
            fill="white" />
          <path
            d="M13.75 10.625H6.25C5.9 10.625 5.625 10.35 5.625 10C5.625 9.65 5.9 9.375 6.25 9.375H13.75C14.1 9.375 14.375 9.65 14.375 10C14.375 10.35 14.1 10.625 13.75 10.625Z"
            fill="white" />
        </svg>
        {{ buttonLabel }}
      </button>
    </div>

  </div>
</div>
