<div class="flex flex-col min-h-screen bg-[#F9FAFB]">
  <!-- Sidebar : on passe le role à la sidebar -->
  <app-sidebar class="lg:fixed lg:top-0 lg:left-0 lg:h-full" [role]="normalizedRole" [isOpen]="isSidebarOpen"
    (closeSidebar)="closeSidebar()"></app-sidebar>

  <!-- Mobile hamburger button -->
  <button
    class="lg:hidden fixed top-3 left-3 z-50 w-10 h-10 sm:top-4 sm:left-4 sm:w-11 sm:h-11 rounded-lg shadow-sm bg-white flex items-center justify-center hover:bg-gray-50 transition-colors"
    (click)="toggleSidebar()" aria-label="Toggle menu">
    <svg class="w-4 h-4 sm:w-[17px] sm:h-[14px]" viewBox="0 0 17 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M15 0H1.25C0.918479 0 0.600537 0.131696 0.366116 0.366116C0.131696 0.600537 0 0.918479 0 1.25V12.5C0 12.8315 0.131696 13.1495 0.366116 13.3839C0.600537 13.6183 0.918479 13.75 1.25 13.75H15C15.3315 13.75 15.6495 13.6183 15.8839 13.3839C16.1183 13.1495 16.25 12.8315 16.25 12.5V1.25C16.25 0.918479 16.1183 0.600537 15.8839 0.366116C15.6495 0.131696 15.3315 0 15 0ZM1.25 8.75H2.5C2.66576 8.75 2.82473 8.68415 2.94194 8.56694C3.05915 8.44973 3.125 8.29076 3.125 8.125C3.125 7.95924 3.05915 7.80027 2.94194 7.68306C2.82473 7.56585 2.66576 7.5 2.5 7.5H1.25V6.25H2.5C2.66576 6.25 2.82473 6.18415 2.94194 6.06694C3.05915 5.94973 3.125 5.79076 3.125 5.625C3.125 5.45924 3.05915 5.30027 2.94194 5.18306C2.82473 5.06585 2.66576 5 2.5 5H1.25V3.75H2.5C2.66576 3.75 2.82473 3.68415 2.94194 3.56694C3.05915 3.44973 3.125 3.29076 3.125 3.125C3.125 2.95924 3.05915 2.80027 2.94194 2.68306C2.82473 2.56585 2.66576 2.5 2.5 2.5H1.25V1.25H4.375V12.5H1.25V8.75ZM15 12.5H5.625V1.25H15V12.5Z"
        fill="#1C1C1C" />
    </svg>
  </button>


  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col lg:ml-64 transition-all duration-300">
    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto">
      <div class="p-4 sm:p-6">
        <ng-content></ng-content>
      </div>
    </main>
  </div>
</div>
