<div class="space-y-2">
  <label class="text-[15px] font-medium text-gray-700">
    {{ label }}
    <span *ngIf="required" class="text-red-500">*</span>
  </label>

  <!-- Input natif -->
  <div *ngIf="type === 'date'" class="relative">
    <input [type]="type" [placeholder]="placeholder" [formControl]="$any(control)" [min]="getMinDate()"
      class="w-full p-3 rounded-md border border-[#CBD5E1] focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] outline-none transition-all text-base placeholder:text-[#6B7280] placeholder:font-light [&::-webkit-calendar-picker-indicator]:opacity-0 [&::-webkit-calendar-picker-indicator]:absolute [&::-webkit-calendar-picker-indicator]:right-0 [&::-webkit-calendar-picker-indicator]:w-full [&::-webkit-calendar-picker-indicator]:h-full [&::-webkit-calendar-picker-indicator]:cursor-pointer"
      [class.border-red-500]="error" />
    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
      <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M16 2H15V1C15 0.45 14.55 0 14 0C13.45 0 13 0.45 13 1V2H5V1C5 0.45 4.55 0 4 0C3.45 0 3 0.45 3 1V2H2C0.89 2 0.00999999 2.9 0.00999999 4L0 18C0 18.5304 0.210714 19.0391 0.585786 19.4142C0.960859 19.7893 1.46957 20 2 20H16C17.1 20 18 19.1 18 18V4C18 2.9 17.1 2 16 2ZM16 17C16 17.55 15.55 18 15 18H3C2.45 18 2 17.55 2 17V7H16V17ZM4 9H6V11H4V9ZM8 9H10V11H8V9ZM12 9H14V11H12V9Z"
          fill="#505056" />
      </svg>
    </div>
  </div>

  <input *ngIf="type && type !== 'select' && type !== 'textarea' && type !== 'date'" [type]="type"
    [placeholder]="placeholder" [formControl]="$any(control)"
    class="w-full p-3 rounded-md border border-[#CBD5E1] focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] outline-none transition-all text-base placeholder:text-[#6B7280] placeholder:font-light"
    [class.border-red-500]="error" />

  <!-- Select natif -->
  <div *ngIf="type === 'select'" class="relative">
    <select [formControl]="$any(control)"
      class="w-full p-3 rounded-md border border-[#CBD5E1] focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] outline-none transition-all text-base text-[#6B7280] font-light appearance-none bg-white"
      [class.border-red-500]="error">
      <ng-container *ngIf="options && options.length > 0">
        <option *ngIf="placeholder" value="">{{ placeholder }}</option>
        <option *ngFor="let opt of options" [value]="opt.value">{{ opt.label }}</option>
      </ng-container>
      <ng-container *ngIf="!options || options.length === 0">
        <ng-content></ng-content>
      </ng-container>
    </select>
    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
      <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1.5L6 6.5L11 1.5" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </div>
  </div>

  <!-- Textarea natif -->
  <textarea *ngIf="type === 'textarea'" [placeholder]="placeholder" [rows]="rows" [formControl]="$any(control)"
    class="w-full p-3 rounded-md border border-[#CBD5E1] focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] outline-none transition-all text-base placeholder:text-[#6B7280] placeholder:font-light resize-none"
    [class.border-red-500]="error">
      </textarea>

  <!-- Content projection pour cas avancés -->
  <ng-content *ngIf="!type"></ng-content>

  <p *ngIf="hint" class="text-gray-500 text-xs mt-1">{{ hint }}</p>
  <p *ngIf="error" class="text-red-500 text-xs mt-1">{{ error }}</p>
</div>
