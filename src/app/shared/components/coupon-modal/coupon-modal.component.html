<ui-modal [isOpen]="isOpen" title="Créer un nouveau coupon" (close)="onClose()">
  <form [formGroup]="couponForm" (ngSubmit)="onSubmit()">
    <div class="space-y-4 px-1 max-h-[70vh] overflow-y-auto">
      <p class="text-sm text-gray-600">Code promo à saisir sur le panier (réduction en pourcentage sur le total).</p>

      <!-- Nom / Code -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <ui-form-field label="Nom" type="text" placeholder="Ex: Été 2025" [required]="true"
          [control]="couponForm.get('name')!" [error]="getFieldError('name')">
        </ui-form-field>
        <ui-form-field label="Code" type="text" placeholder="Ex: ETE2025" [required]="true"
          [control]="couponForm.get('code')!" [error]="getFieldError('code')">
        </ui-form-field>
      </div>

      <!-- Valeur (toujours %) -->
      <div class="flex items-end gap-2 flex-wrap">
        <div class="min-w-[120px] flex-1">
          <ui-form-field label="Réduction (%)" type="text" placeholder="10" [required]="true"
            [control]="couponForm.get('value')!" [error]="getFieldError('value')">
          </ui-form-field>
        </div>
        <span class="pb-3 text-gray-600">%</span>
      </div>

      <!-- Dates -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <ui-form-field label="Date début" type="date" [required]="true"
          [control]="couponForm.get('dateDebut')!" [error]="getFieldError('dateDebut')">
        </ui-form-field>
        <ui-form-field label="Date fin" type="date" [required]="true"
          [control]="couponForm.get('dateFin')!" [error]="getFieldError('dateFin')">
        </ui-form-field>
      </div>
      <p *ngIf="dateRangeError" class="text-red-500 text-xs">{{ dateRangeError }}</p>
    </div>

    <div class="flex flex-col-reverse sm:flex-row items-stretch sm:items-center justify-end gap-2 pt-4 mt-4 border-t border-gray-100">
      <button type="button" (click)="onClose()"
        class="px-4 py-3 bg-[#DDE2E433] text-gray-600 hover:bg-gray-100 rounded-lg font-medium">
        Annuler
      </button>
      <button type="submit"
        [disabled]="couponForm.invalid || isSubmitting || !!dateRangeError"
        class="px-4 py-3 bg-[#2C2D5B] hover:bg-[#232b5c] disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-lg font-medium">
        {{ isSubmitting ? 'Création...' : 'Créer le coupon' }}
      </button>
    </div>
  </form>
</ui-modal>
