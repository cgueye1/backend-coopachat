        <!-- Close Button (implied by "desktop/mobile handling", useful to have) -->
        <button (click)="toggle()" class="text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-white relative">
        <div class="flex items-start gap-3">
            <!-- Avatar -->
            <div
                class="flex-shrink-0 w-8 h-8 2xl:w-10 2xl:h-10 rounded-full bg-gradient-to-r from-[#FF6B00] to-[#FF914D] flex items-center justify-center text-white text-xs 2xl:text-sm font-medium shadow-sm">
                CA
            </div>

            <div class="space-y-3 max-w-[85%]">
                <!-- Messages -->
                <div *ngFor="let msg of messages"
                    [ngClass]="{'bg-[#E9EEF9]': msg.from === 'bot', 'bg-[#FF6B00] text-white': msg.from === 'user'}"
                    class="p-3.5 rounded-2xl rounded-bl-none text-[#1F2937] text-sm leading-relaxed whitespace-pre-wrap">
                    {{ msg.text }}</div>

                <!-- Chips -->
                <div class="flex flex-wrap gap-2 pt-1" *ngIf="messages.length === 2">
                    <!-- Showing chips only after first bot message for now -->
                    <button
                        class="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs sm:text-sm text-[#374151] hover:bg-gray-50 hover:border-gray-300 transition-all font-medium whitespace-nowrap shadow-sm">
                        Client
                    </button>
                    <button
                        class="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs sm:text-sm text-[#374151] hover:bg-gray-50 hover:border-gray-300 transition-all font-medium whitespace-nowrap shadow-sm">
                        Livreur
                    </button>
                    <button
                        class="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs sm:text-sm text-[#374151] hover:bg-gray-50 hover:border-gray-300 transition-all font-medium whitespace-nowrap shadow-sm">
                        Commercial
                    </button>
                    <button
                        class="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs sm:text-sm text-[#374151] hover:bg-gray-50 hover:border-gray-300 transition-all font-medium whitespace-nowrap shadow-sm">
                        Logistique
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-white border-t border-gray-100">
        <div class="relative flex items-center">

            <input type="text" placeholder="Envoyer un message..."
                class="w-full py-3.5 pl-6 pr-24 bg-white border border-gray-200 rounded-full text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-[#FF6B00] focus:ring-1 focus:ring-[#FF6B00] transition-colors shadow-sm">
