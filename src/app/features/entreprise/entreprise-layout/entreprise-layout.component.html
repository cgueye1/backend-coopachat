<div class="flex h-screen bg-[#F4F7FE] overflow-hidden">

  <!-- ===== SIDEBAR ===== -->
  <aside class="w-56 flex-shrink-0 bg-[#2B3674] flex flex-col">

    <!-- Logo entreprise -->
    <div class="px-4 py-5 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-[#FF6B00] flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
          {{ companyInitials }}
        </div>
        <div>
          <p class="text-white font-bold text-sm leading-tight">{{ companyName }}</p>
          <p class="text-[#FF6B00] text-xs font-medium">Espace entreprise</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 space-y-1">

      <!-- Tableau de bord -->
      <a routerLink="/entreprise/dashboard"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer"
        [class.bg-white]="isActive('/entreprise/dashboard')"
        [class.text-[#2B3674]]="isActive('/entreprise/dashboard')"
        [class.font-semibold]="isActive('/entreprise/dashboard')"
        [class.text-white]="!isActive('/entreprise/dashboard')"
        [class.hover:bg-white]="!isActive('/entreprise/dashboard')"
        [class.hover:text-[#2B3674]]="!isActive('/entreprise/dashboard')"
        [class.opacity-80]="!isActive('/entreprise/dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="text-sm">Tableau de bord</span>
      </a>

      <!-- Mes salariés -->
      <a routerLink="/entreprise/salaries"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer"
        [class.bg-white]="isActive('/entreprise/salaries')"
        [class.text-[#2B3674]]="isActive('/entreprise/salaries')"
        [class.font-semibold]="isActive('/entreprise/salaries')"
        [class.text-white]="!isActive('/entreprise/salaries')"
        [class.opacity-80]="!isActive('/entreprise/salaries')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="text-sm">Mes salariés</span>
      </a>

      <!-- Mon profil -->
      <a routerLink="/entreprise/profil"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer"
        [class.bg-white]="isActive('/entreprise/profil')"
        [class.text-[#2B3674]]="isActive('/entreprise/profil')"
        [class.font-semibold]="isActive('/entreprise/profil')"
        [class.text-white]="!isActive('/entreprise/profil')"
        [class.opacity-80]="!isActive('/entreprise/profil')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="text-sm">Mon profil</span>
      </a>
    </nav>

    <!-- Footer utilisateur -->
    <div class="px-4 py-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-[#FF6B00] flex items-center justify-center text-white font-bold text-xs flex-shrink-0">
          FT
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-white text-sm font-medium truncate">{{ contactName }}</p>
          <p class="text-white/50 text-xs truncate">Contact {{ companyName }}</p>
        </div>
        <button (click)="logout()" title="Déconnexion" class="text-white/40 hover:text-white transition-colors">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

</div>
