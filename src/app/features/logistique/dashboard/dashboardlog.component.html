<app-main-layout [role]="role">
    <!-- Header Section -->
    <app-header [title]="'Tableau de bord'" [breadcrumb]="'Pages / Tableau de bord'" [type]="'filter'"></app-header>

    <div *ngIf="dashboardError" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ dashboardError }}
    </div>

    <!-- Metrics Cards -->
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4 lg:grid-cols-4 lg:gap-4 mb-3 sm:mb-6 2xl:mb-8">
        <div *ngFor="let metric of metricsData"
            class="bg-white rounded-lg p-3 sm:p-4 hover:shadow-sm transition-shadow">
            <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 sm:gap-0 ">
                <div class="flex-1">
                    <div class="text-xs text-[#6B7280] mb-1">{{ metric.title }}</div>
                    <div class="text-2xl font-semibold text-[#2B3674] mb-4">{{ metric.value }}</div>
                    <div class="text-xs" [ngClass]="getMetricSubtitleClass(metric.subtitle)">
                        {{ metric.subtitle }}
                    </div>
                </div>
                <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-lg flex items-center justify-center flex-shrink-0">
                    <img [src]="metric.icon" alt="icon" class="w-7 h-7 sm:w-8 sm:h-8">
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="flex flex-col gap-3 sm:gap-4 xl:grid xl:grid-cols-3 xl:gap-6 mb-3 sm:mb-4 2xl:mb-8">
        <!-- Livraisons par jour (date prévue) — 7 derniers jours -->
        <div
            class="order-1 xl:col-span-2 bg-white rounded-lg p-3 sm:p-6 hover:shadow-sm transition-shadow">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3 sm:mb-4">
                <h3 class="text-base sm:text-lg font-semibold text-gray-900">Livraisons par jour</h3>
                <a routerLink="/log/commandes"
                    class="self-start text-xs sm:text-sm text-gray-600 px-3 py-1.5 border border-gray-300 rounded-full hover:bg-gray-50 transition-colors">
                    Voir détails
                </a>
            </div>
            <div class="relative h-56 sm:h-80">
                <canvas #commandesChart></canvas>
            </div>
        </div>

        <!-- Stocks - État global -->
        <div class="order-2 bg-white rounded-lg p-3 sm:p-6 hover:shadow-sm transition-shadow">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3 sm:mb-4">
                <h3 class="text-base sm:text-lg font-semibold text-gray-900">Stocks - État global</h3>
                <a routerLink="/log/stocks"
                    class="self-start text-xs sm:text-sm text-gray-600 px-3 py-1.5 border border-gray-300 rounded-full hover:bg-gray-50 transition-colors">
                    Voir détails
                </a>
            </div>

            <div class="flex items-center justify-center h-72">
                <div class="relative w-full max-w-[280px] h-64 flex items-center justify-center">
                    <div *ngIf="dashboardLoading"
                        class="absolute inset-0 z-10 flex items-center justify-center rounded-lg bg-white/85 text-sm text-[#6B7280]">
                        Chargement…
                    </div>
                    <canvas #stocksChart></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Graphiques de statistiques -->
    <div class="flex flex-col gap-3 sm:gap-4 lg:grid lg:grid-cols-2 lg:gap-6 mb-3 sm:mb-4">
        <!-- Statut des livraisons -->
        <div class="bg-white rounded-lg p-3 sm:p-5 hover:shadow-sm transition-shadow">
            <div class="flex flex-col sm:flex-row  sm:items-center sm:justify-between mb-3 sm:mb-4">
                <h3 class="text-sm sm:text-base font-semibold text-gray-900">Statut des livraisons</h3>
                <a routerLink="/log/livraisons"
                    class="self-start text-xs sm:text-sm text-gray-600 px-3 py-1.5 border border-gray-300 rounded-full hover:bg-gray-50 transition-colors">
                    Voir détails
                </a>
            </div>
            <div class="flex items-center justify-center h-72 2xl:h-96">
                <div class="relative">
                    <canvas #deliveryStatusChart></canvas>
                </div>
            </div>
        </div>

        <!-- Taux de retours (%) - même niveau que le donut -->
        <div class="bg-white rounded-lg p-3 sm:p-6 hover:shadow-sm transition-shadow flex flex-col">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3 sm:mb-4">
                <h3 class="text-sm sm:text-base font-semibold text-gray-900">Taux de retours (%)</h3>
                <a routerLink="/log/retours"
                    class="self-start text-xs sm:text-sm text-gray-600 px-3 py-1.5 border border-gray-300 rounded-full hover:bg-gray-50 transition-colors">
                    Voir détails
                </a>
            </div>
            <div class="relative flex-1 min-h-[280px] h-72 2xl:h-96">
                <div *ngIf="dashboardLoading"
                    class="absolute inset-0 z-10 flex items-center justify-center rounded-lg bg-white/85 text-sm text-[#6B7280]">
                    Chargement…
                </div>
                <canvas #returnRateChart class="w-full h-full block"></canvas>
            </div>
        </div>
    </div>

</app-main-layout>
