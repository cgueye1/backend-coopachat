<app-main-layout role="com">
    <div class="space-y-6">
        <!-- Header avec filtres -->
        <app-header [title]="'Statistiques des Ventes'" [breadcrumb]="'Pages / Statistiques'" type="filter"
            [supplierLabel]="'Entreprise'">
        </app-header>


        <!-- Cartes de statistiques -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div *ngFor="let stat of statsCards" class="bg-white rounded-lg p-5 hover:shadow-sm transition-shadow">
                <div class="flex items-start justify-between">
                    <div class="flex-1">
                        <div class="text-xs text-[#6B7280] mb-1">{{ stat.title }}</div>
                        <div class="text-2xl font-medium text-[#2B3674]">{{ stat.value }}</div>
                    </div>
                    <div class="w-12 h-12 rounded-lg flex items-center justify-center flex-shrink-0">
                        <img [src]="stat.icon" alt="icon" class="w-8 h-8">
                    </div>
                </div>
            </div>
        </div>
        <!-- Graphiques -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-4">
            <!-- Évolution des ventes -->
            <div class="bg-white rounded-xl  shadow-sm border border-gray-100 py-4 sm:py-6">
                <h3 class="text-base font-medium text-[#111827] mb-4 border-b border-gray-200 pb-4 sm:px-6">Évolution
                    des
                    ventes</h3>
                <div class="relative h-80 px-12">
                    <canvas #salesChart></canvas>
                </div>
            </div>
            <!-- Nombre de commandes -->
            <div class="bg-white rounded-xl py-4 shadow-sm border border-gray-100 sm:py-6">
                <h3 class="text-base font-medium text-[#111827] mb-4 border-b border-gray-200 pb-4 sm:px-6">Nombre de
                    commandes</h3>
                <div class="relative h-80 px-12">
                    <canvas #ordersChart></canvas>
                </div>
            </div>
        </div>
        <!-- Section Détails et Analyse -->
        <div class="bg-white rounded-xl shadow-md">
            <div class="border-b border-gray-200 pb-2 sm:py-4">
                <h2 class="text-base 2xl:text-xl font-medium text-[#111827] pb-2 sm:px-6">Détails et Analyse</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-4 pb-4">
                <!-- Informations générales -->
                <div>
                    <h3 class="text-base font-medium text-[#111827] mb-4 sm:px-6">Informations générales</h3>
                    <div class="sm:px-6">
                        <div *ngFor="let info of generalInfo" class="flex items-center justify-between py-2">
                            <span class="text-xs text-[#6B7280]">{{ info.label }}</span>
                            <div class="flex items-center gap-2">
                                <!-- Icône positive -->
                                <span *ngIf="info.trend && info.trendType === 'positive'"
                                    class="inline-flex items-center text-xs font-medium text-green-600">
                                    <svg width="17" height="16" viewBox="0 0 17 16" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <g clip-path="url(#clip0_24_798)">
                                            <path d="M11.165 4.6665H15.165V8.6665" stroke="#22C55E" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round" />
                                            <path d="M15.1654 4.6665L9.4987 10.3332L6.16536 6.99984L1.83203 11.3332"
                                                stroke="#22C55E" stroke-width="2" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                        </g>
                                        <defs>
                                            <clipPath id="clip0_24_798">
                                                <rect width="16" height="16" fill="white"
                                                    transform="translate(0.498535)" />
                                            </clipPath>
                                        </defs>
                                    </svg>
                                </span>
                                <!-- Icône négative -->
                                <span *ngIf="info.trend && info.trendType === 'negative'"
                                    class="inline-flex items-center text-xs font-medium text-red-600">
                                    <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd"
                                            d="M14.707 10.293a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 111.414-1.414L9 12.586V5a1 1 0 012 0v7.586l2.293-2.293a1 1 0 011.414 0z"
                                            clip-rule="evenodd"></path>
                                    </svg>
                                    {{ info.trend }}
                                </span>

                                <!-- Valeur -->
                                <span class="text-xs text-[#111827]">{{ info.value }}</span>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- Analyse et recommandations -->
                <div>
                    <h3 class="text-base font-medium text-[#111827] mb-4">Analyse et recommandations</h3>
                    <div class="space-y-6 bg-[#F9FAFB] p-4 rounded-lg">
                        <p class="text-xs text-[#4B5563]">
                            Sélectionnez une entreprise spécifique pour voir des recommandations personnalisées.
                        </p>
                        <span></span>
                        <button (click)="analyzePotential()"
                            class="w-full inline-flex items-center justify-center px-4 py-2 gap-6 bg-[#4F46E5] text-white text-xs font-medium rounded-lg hover:bg-[#5856EB] transition-colors">
                            <svg width="17" height="16" viewBox="0 0 17 16" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M8.26416 13.3332V6.6665" stroke="white" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M12.2642 13.3332V2.6665" stroke="white" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M4.26416 13.3332V10.6665" stroke="white" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            Analyser le potentiel
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</app-main-layout>
