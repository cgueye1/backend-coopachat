<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">{{ title }}</h1>
    <button (click)="openAddModal()" 
      class="bg-[#FF6B00] hover:bg-[#E66000] text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2 shadow-sm">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Ajouter
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100 text-gray-600 text-sm font-semibold">
            <th class="px-6 py-4">Nom</th>
            <th class="px-6 py-4">Description</th>
            <th class="px-6 py-4 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngIf="loading" class="animate-pulse">
            <td colspan="3" class="px-6 py-8 text-center text-gray-400">Chargement...</td>
          </tr>
          <tr *ngIf="!loading && items.length === 0">
            <td colspan="3" class="px-6 py-8 text-center text-gray-400 italic">Aucun élément trouvé</td>
          </tr>
          <tr *ngFor="let item of items" class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 font-medium text-gray-800">{{ item.name }}</td>
            <td class="px-6 py-4 text-gray-600 text-sm">{{ item.description }}</td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end gap-2">
                <button (click)="openEditModal(item)" 
                  class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Modifier">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4L18.5 2.5z"></path>
                  </svg>
                </button>
                <button (click)="deleteItem(item)" 
                  class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Supprimer">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
      <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
        <h2 class="text-xl font-bold text-gray-800">{{ isEdit ? 'Modifier' : 'Ajouter' }} {{ title }}</h2>
        <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nom *</label>
          <input type="text" [(ngModel)]="currentItem.name" 
            class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#FF6B00]/20 focus:border-[#FF6B00] transition-all"
            placeholder="Nom de l'élément">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
          <textarea [(ngModel)]="currentItem.description" rows="3"
            class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#FF6B00]/20 focus:border-[#FF6B00] transition-all"
            placeholder="Description optionnelle"></textarea>
        </div>
      </div>

      <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
        <button (click)="closeModal()" 
          class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg transition-all font-medium">
          Annuler
        </button>
        <button (click)="saveItem()" 
          class="px-6 py-2 bg-[#FF6B00] hover:bg-[#E66000] text-white rounded-lg transition-all font-bold shadow-sm shadow-[#FF6B00]/20">
          {{ isEdit ? 'Mettre à jour' : 'Enregistrer' }}
        </button>
      </div>
    </div>
  </div>
</div>
