<app-main-layout role="admin">
    <div class="space-y-4 sm:space-y-5 lg:space-y-6">
        <!-- Header with back navigation -->
        <app-header [title]="editId ? 'Modifier l\'utilisateur' : 'Nouveau utilisateur'"
            [breadcrumb]="editId ? 'Pages / Gestion des utilisateurs / Modifier' : 'Pages / Gestion des utilisateurs / Nouveau utilisateur'" [type]="'back'"
            (actionClick)="goBack()">
        </app-header>

        <!-- Form Container -->
        <div class="mx-auto">
            <div class="bg-white rounded-2xl p-4 sm:p-5 lg:p-6">
                <!-- Section Title -->
                <h2
                    class="text-lg font-semibold text-[#2C3E50] pb-3 mb-4 border-b border-[#F4F7FE] -mx-4 px-4 sm:text-xl sm:pb-4 sm:mb-6 sm:-mx-5 sm:px-5 lg:-mx-6 lg:px-6">
                    Informations générales
                </h2>

                <!-- Form Grid -->
                <div class="space-y-4 sm:space-y-5 lg:space-y-6">
                    <!-- Row 1: Prénom & Nom -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4 lg:gap-6">
                        <!-- Prénom -->
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="block font-medium text-[#333333] text-sm sm:text-base">
                                Prénom
                            </label>
                            <input type="text" [(ngModel)]="newUser.prenom" placeholder="Saisir"
                                [class.border-red-500]="errors.prenom"
                                class="w-full px-3 py-2.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-xs placeholder-[#9CA3AF] transition-colors sm:px-4 sm:py-3 sm:text-sm lg:py-3.5">
                            <p *ngIf="errors.prenom" class="text-red-500 text-xs mt-1">{{ errors.prenom }}</p>
                        </div>

                        <!-- Nom -->
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="block font-medium text-[#333333] text-sm sm:text-base">
                                Nom
                            </label>
                            <input type="text" [(ngModel)]="newUser.nom" placeholder="Saisir"
                                [class.border-red-500]="errors.nom"
                                class="w-full px-3 py-2.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-xs placeholder-[#9CA3AF] transition-colors sm:px-4 sm:py-3 sm:text-sm lg:py-3.5">
                            <p *ngIf="errors.nom" class="text-red-500 text-xs mt-1">{{ errors.nom }}</p>
                        </div>
                    </div>

                    <!-- Row 2: Email & Téléphone -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4 lg:gap-6">
                        <!-- Email -->
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="block font-medium text-[#333333] text-sm sm:text-base">
                                Adresse email
                            </label>
                            <input type="email" [(ngModel)]="newUser.email" placeholder="Saisir"
                                [class.border-red-500]="errors.email"
                                class="w-full px-3 py-2.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-xs placeholder-[#9CA3AF] transition-colors sm:px-4 sm:py-3 sm:text-sm lg:py-3.5">
                            <p *ngIf="errors.email" class="text-red-500 text-xs mt-1">{{ errors.email }}</p>
                        </div>

                        <!-- Téléphone -->
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="block font-medium text-[#333333] text-sm sm:text-base">
                                Téléphone
                            </label>
                            <input type="tel" [(ngModel)]="newUser.telephone" placeholder="Saisir"
                                [class.border-red-500]="errors.telephone"
                                class="w-full px-3 py-2.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-xs placeholder-[#9CA3AF] transition-colors sm:px-4 sm:py-3 sm:text-sm lg:py-3.5">
                            <p *ngIf="errors.telephone" class="text-red-500 text-xs mt-1">{{ errors.telephone }}</p>
                        </div>
                    </div>

                    <!-- Row 3: Rôle & Photo de profil -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4 lg:gap-6">
                        <!-- Rôle -->
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="block font-medium text-[#333333] text-sm sm:text-base">
                                Rôle
                            </label>
                            <div class="relative">
                                <button type="button" (click)="toggleRoleDropdown()"
                                    [class.border-red-500]="errors.role"
                                    class="w-full px-3 py-2.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-xs text-left bg-white transition-colors flex items-center justify-between sm:px-4 sm:py-3 sm:text-sm lg:py-3.5">
                                    <span [class.text-[#9CA3AF]]="!newUser.role" [class.text-[#2C3E50]]="newUser.role">
                                        {{ newUser.role || 'Sélectionner' }}
                                    </span>
                                    <svg [class.rotate-180]="showRoleDropdown"
                                        class="w-3 h-3 text-[#9CA3AF] transition-transform sm:w-4 sm:h-4" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 9l-7 7-7-7" />
                                    </svg>
                                </button>

                                <!-- Dropdown Menu -->
                                <div *ngIf="showRoleDropdown"
                                    class="absolute top-full left-0 right-0 mt-1 bg-white rounded-md shadow-lg border border-[#CBD5E1] py-1 z-10 max-h-60 overflow-y-auto">
                                    <button *ngFor="let role of roles" type="button" (click)="selectRole(role)"
                                        class="w-full text-left px-3 py-2 text-xs text-[#2C3E50] hover:bg-[#F9FAFB] transition-colors sm:px-4 sm:py-2.5 sm:text-sm">
                                        {{ role }}
                                    </button>
                                </div>
                            </div>
                            <p *ngIf="errors.role" class="text-red-500 text-xs mt-1">{{ errors.role }}</p>
                        </div>

                        <!-- Photo de profil -->
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="block font-medium text-[#333333] text-sm sm:text-base">
                                Photo de profil
                            </label>
                            <div class="flex items-center gap-3">
                                <div class="w-14 h-14 rounded-full border-2 border-[#CBD5E1] overflow-hidden bg-[#F4F7FE] flex items-center justify-center flex-shrink-0">
                                    <img *ngIf="profilePhotoPreview" [src]="profilePhotoPreview" alt="Aperçu" class="w-full h-full object-cover" />
                                    <img *ngIf="!profilePhotoPreview && currentProfilePhotoUrl" [src]="currentProfilePhotoUrl" alt="Photo actuelle" class="w-full h-full object-cover" />
                                    <span *ngIf="!profilePhotoPreview && !currentProfilePhotoUrl" class="text-[#9CA3AF] text-xl">?</span>
                                </div>
                                <div class="flex flex-col gap-1 min-w-0">
                                    <input #photoInput type="file" accept="image/jpeg,image/png,image/jpg" (change)="onProfilePhotoChange($event)"
                                        class="block w-full text-xs text-[#6B7280] file:mr-2 file:py-1.5 file:px-2.5 file:rounded file:border-0 file:text-xs file:font-medium file:bg-[#2C2D5B] file:text-white file:cursor-pointer cursor-pointer" />
                                    <button *ngIf="profilePhotoPreview || currentProfilePhotoUrl" type="button" (click)="clearProfilePhoto(photoInput)"
                                        class="text-xs text-[#6B7280] hover:text-[#2C2D5B] underline text-left">
                                        Retirer la photo
                                    </button>
                                </div>
                            </div>
                            <p class="text-[#9CA3AF] text-xs">JPG ou PNG, max 5 Mo</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row items-center justify-end gap-2 mt-4 sm:gap-3 sm:mt-5 lg:mt-6">
                    <button (click)="enregistrer()" [disabled]="saving"
                        class="w-full sm:w-auto px-6 py-2.5 bg-[#2C2D5B] hover:bg-[#232447] text-white rounded-md font-medium transition-colors text-xs sm:px-8 sm:py-3 sm:text-sm lg:px-12 lg:py-4 disabled:opacity-50">
                        {{ saving ? 'Enregistrement...' : (editId ? 'Mettre à jour' : 'Enregistrer') }}
                    </button>
                    <button (click)="annuler()"
                        class="w-full sm:w-auto px-6 py-2.5 bg-[#F3F4F6] hover:bg-[#CBD5E1] text-[#6B7280] rounded-md font-medium transition-colors text-xs sm:px-8 sm:py-3 sm:text-sm lg:px-12 lg:py-4">
                        Annuler
                    </button>
                </div>
            </div>
        </div>
    </div>
</app-main-layout>
