<app-main-layout role="admin">
    <div class="min-h-screen bg-[#F9FAFB]">
        <!-- Header with back navigation -->
        <app-header [title]="'Nouveau utilisateur'"
            [breadcrumb]="'Pages / Gestion des utilisateurs / Nouveau utilisateur'" [type]="'back'"
            (actionClick)="goBack()">
        </app-header>

        <!-- Form Container -->
        <div class="mx-auto py-2">
            <div class="bg-white rounded-2xl p-6">
                <!-- Section Title -->
                <h2 class="text-xl text-[#2C3E50] pb-4 mb-6 border-b border-[#F4F7FE] -mx-6 px-6">Informations générales
                </h2>

                <!-- Form Grid -->
                <div class="space-y-6">
                    <!-- Row 1: Prénom & Nom -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                        <!-- Prénom -->
                        <div class="space-y-2">
                            <label class="block font-medium text-[#333333]">
                                Prénom
                            </label>
                            <input type="text" [(ngModel)]="newUser.prenom" placeholder="Saisir"
                                [class.border-red-500]="errors.prenom"
                                class="w-full px-4 py-3.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-sm placeholder-[#9CA3AF] transition-colors">
                            <p *ngIf="errors.prenom" class="text-red-500 text-xs mt-1">{{ errors.prenom }}</p>
                        </div>

                        <!-- Nom -->
                        <div class="space-y-2">
                            <label class="block font-medium text-[#333333]">
                                Nom
                            </label>
                            <input type="text" [(ngModel)]="newUser.nom" placeholder="Saisir"
                                [class.border-red-500]="errors.nom"
                                class="w-full px-4 py-3.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-sm placeholder-[#9CA3AF] transition-colors">
                            <p *ngIf="errors.nom" class="text-red-500 text-xs mt-1">{{ errors.nom }}</p>
                        </div>
                    </div>

                    <!-- Row 2: Email & Téléphone -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                        <!-- Email -->
                        <div class="space-y-2">
                            <label class="block font-medium text-[#333333]">
                                Adresse email
                            </label>
                            <input type="email" [(ngModel)]="newUser.email" placeholder="Saisir"
                                [class.border-red-500]="errors.email"
                                class="w-full px-4 py-3.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-sm placeholder-[#9CA3AF] transition-colors">
                            <p *ngIf="errors.email" class="text-red-500 text-xs mt-1">{{ errors.email }}</p>
                        </div>

                        <!-- Téléphone -->
                        <div class="space-y-2">
                            <label class="block font-medium text-[#333333]">
                                Téléphone
                            </label>
                            <input type="tel" [(ngModel)]="newUser.telephone" placeholder="Saisir"
                                [class.border-red-500]="errors.telephone"
                                class="w-full px-4 py-3.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-sm placeholder-[#9CA3AF] transition-colors">
                            <p *ngIf="errors.telephone" class="text-red-500 text-xs mt-1">{{ errors.telephone }}</p>
                        </div>
                    </div>

                    <!-- Row 3: Rôle (Dropdown) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                        <div class="space-y-2">
                            <label class="block font-medium text-[#333333]">
                                Rôle
                            </label>
                            <div class="relative">
                                <button type="button" (click)="toggleRoleDropdown()"
                                    [class.border-red-500]="errors.role"
                                    class="w-full px-4 py-3.5 border border-[#CBD5E1] rounded-md focus:outline-none focus:border-[#2B3674] focus:ring-1 focus:ring-[#2B3674] text-sm text-left bg-white transition-colors flex items-center justify-between">
                                    <span [class.text-[#9CA3AF]]="!newUser.role" [class.text-[#2C3E50]]="newUser.role">
                                        {{ newUser.role || 'Sélectionner' }}
                                    </span>
                                    <svg [class.rotate-180]="showRoleDropdown"
                                        class="w-4 h-4 text-[#9CA3AF] transition-transform" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 9l-7 7-7-7" />
                                    </svg>
                                </button>

                                <!-- Dropdown Menu -->
                                <div *ngIf="showRoleDropdown"
                                    class="absolute top-full left-0 right-0 mt-1 bg-white rounded-md shadow-lg border border-[#CBD5E1] py-1 z-10 max-h-60 overflow-y-auto">
                                    <button *ngFor="let role of roles" type="button" (click)="selectRole(role)"
                                        class="w-full text-left px-4 py-2.5 text-sm text-[#2C3E50] hover:bg-[#F9FAFB] transition-colors">
                                        {{ role }}
                                    </button>
                                </div>
                            </div>
                            <p *ngIf="errors.role" class="text-red-500 text-xs mt-1">{{ errors.role }}</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row items-center justify-end gap-3 mt-8 pt-6">
                    <button (click)="enregistrer()"
                        class="w-full sm:w-auto px-12 py-4 bg-[#2C2D5B] hover:bg-[#232447] text-white rounded-md font-medium transition-colors text-sm">
                        Enregistrer
                    </button>
                    <button (click)="annuler()"
                        class="w-full sm:w-auto px-12 py-4 bg-[#F3F4F6] hover:bg-[#CBD5E1] text-[#6B7280] rounded-md font-medium transition-colors text-sm">
                        Annuler
                    </button>
                </div>
            </div>
        </div>
    </div>
</app-main-layout>
