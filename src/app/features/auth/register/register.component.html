<app-auth-layout>
  <div class="mb-5 sm:mb-12">
    <h1 class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-gray-800 font-Inter mb-3 sm:mb-4">
      Activer mon compte
    </h1>
    <p class="text-[#49475A] font-light text-sm sm:text-base">
      Les comptes <strong class="font-medium text-[#49475A]">Commercial</strong> et
      <strong class="font-medium text-[#49475A]">Responsable logistique</strong> sont créés par un administrateur.
      Saisissez l’adresse e-mail à laquelle vous avez reçu votre code d’activation.
    </p>
  </div>

  <div *ngIf="isLoading" class="mb-4 text-center">
    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-orange-600"></div>
    <p class="text-gray-600 mt-2 text-sm">Envoi du code…</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit($event)" class="space-y-5 sm:space-y-6">
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-800" for="activate-email">Adresse email</label>
      <input
        id="activate-email"
        type="email"
        formControlName="email"
        placeholder="votre@email.com"
        autocomplete="email"
        class="w-full p-3 sm:p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all duration-200 text-gray-800 bg-transparent placeholder-[#9C9AA5]" />
      <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-500 text-sm mt-1">
        <span *ngIf="form.get('email')?.errors?.['required']">L’adresse email est requise</span>
        <span *ngIf="form.get('email')?.errors?.['email']">Veuillez entrer une adresse email valide</span>
      </div>
    </div>

    <div>
      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="w-full bg-gradient-to-r from-[#FF6B00] to-[#FF914D] text-white p-3 sm:p-4 rounded-lg hover:from-orange-600 hover:to-orange-700 focus:ring-4 focus:ring-orange-200 font-medium text-base sm:text-lg transition-all duration-200 disabled:opacity-70 disabled:cursor-not-allowed">
        {{ isLoading ? 'Envoi en cours…' : 'Envoyer le code' }}
      </button>
    </div>

    <div class="text-center pt-2">
      <span class="text-[#6C7278] text-xs sm:text-sm">Déjà un mot de passe ? </span>
      <a routerLink="/login" class="text-[#2C2D5B] hover:text-orange-500 font-medium text-xs sm:text-sm">Connexion</a>
    </div>
  </form>
</app-auth-layout>
