<app-main-layout [role]="layoutRole">
  <div class="space-y-4 sm:space-y-5 lg:space-y-6">
    <app-header [title]="profile ? ('Mon profil — ' + profile.refUser) : 'Mon profil'"
      breadcrumb="Mon compte" [type]="'simple'"></app-header>

    <div *ngIf="loading" class="bg-white rounded-2xl p-8 text-center text-gray-500">
      Chargement du profil...
    </div>
    <div *ngIf="error" class="bg-white rounded-2xl p-8 text-center text-red-600">
      {{ error }}
    </div>

    <div *ngIf="!loading && !error && profile" class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="p-4 sm:p-8 space-y-6">
        <!-- Avatar et nom -->
        <div class="flex flex-col items-center text-center">
          <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-[#F2F2F2] flex items-center justify-center text-2xl sm:text-4xl font-semibold text-[#4B4848] mb-4 sm:mb-6 relative overflow-hidden">
            <img *ngIf="profilePhotoUrl" [src]="profilePhotoUrl" alt="" class="w-full h-full object-cover" />
            <span *ngIf="!profilePhotoUrl">{{ initials }}</span>
            <span class="absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-white"
              [class.bg-green-500]="profile.isActive"
              [class.bg-red-500]="!profile.isActive"></span>
          </div>
          <h3 class="text-base sm:text-lg text-[#4B4848] mb-1">{{ fullName }}</h3>
          <p class="text-xs text-gray-600">{{ profile.roleLabel }}</p>
        </div>

        <!-- Détails -->
        <div class="space-y-4 sm:space-y-6">
          <div class="flex items-start gap-2 sm:gap-3">
            <div class="w-5 h-5 mt-0.5 flex-shrink-0">
              <svg class="w-4 h-4" width="14" height="12" viewBox="0 0 14 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.6667 2H9.33333V1.33333C9.3328 0.979874 9.19216 0.641042 8.94222 0.391109C8.69229 0.141175 8.35346 0.000529 8 0H5.33333C4.97987 0.000529 4.64104 0.141175 4.39111 0.391109C4.14117 0.641042 4.00053 0.979874 4 1.33333V2H1.66667C1.22464 2 0.800716 2.17559 0.488155 2.48816C0.175595 2.80072 0 3.22464 0 3.66667V10.3333C0 10.7754 0.175595 11.1993 0.488155 11.5118C0.800716 11.8244 1.22464 12 1.66667 12H11.6667C12.1087 12 12.5326 11.8244 12.8452 11.5118C13.1577 11.1993 13.3333 10.7754 13.3333 10.3333V3.66667C13.3333 3.22464 13.1577 2.80072 12.8452 2.48816C12.5326 2.17559 12.1087 2 11.6667 2ZM4.66667 1.33333C4.66667 1.15652 4.7369 0.986953 4.86193 0.861929C4.98695 0.736905 5.15652 0.666667 5.33333 0.666667H8C8.17681 0.666667 8.34638 0.736905 8.4714 0.861929C8.59643 0.986953 8.66667 1.15652 8.66667 1.33333V2H4.66667V1.33333ZM12.6667 10.3333C12.6667 10.5985 12.5613 10.8529 12.3738 11.0404C12.1862 11.228 11.9319 11.3333 11.6667 11.3333H1.66667C1.40145 11.3333 1.1471 11.228 0.95956 11.0404C0.772023 10.8529 0.666667 10.5985 0.666667 10.3333V6.018L4.56133 7.31667C4.59532 7.32784 4.63089 7.33347 4.66667 7.33333H8.66667C8.70244 7.33347 8.73801 7.32784 8.772 7.31667L12.6667 6.018V10.3333Z" fill="#64748B" />
              </svg>
            </div>
            <div class="flex justify-between items-center w-full">
              <p class="text-xs sm:text-sm text-gray-900">{{ profile.roleLabel }}</p>
              <p class="text-[10px] sm:text-xs text-gray-500">Rôle</p>
            </div>
          </div>
          <div class="flex items-start gap-2 sm:gap-3">
            <div class="w-5 h-5 mt-0.5 flex-shrink-0">
              <svg class="w-4 h-4" width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 2C0 1.46957 0.210714 0.960859 0.585786 0.585786C0.960859 0.210714 1.46957 0 2 0H14C14.5304 0 15.0391 0.210714 15.4142 0.585786C15.7893 0.960859 16 1.46957 16 2V10C16 10.5304 15.7893 11.0391 15.4142 11.4142C15.0391 11.7893 14.5304 12 14 12H2C1.46957 12 0.960859 11.7893 0.585786 11.4142C0.210714 11.0391 0 10.5304 0 10V2ZM2 1C1.73478 1 1.48043 1.10536 1.29289 1.29289C1.10536 1.48043 1 1.73478 1 2V2.217L8 6.417L15 2.217V2C15 1.73478 14.8946 1.48043 14.7071 1.29289C14.5196 1.10536 14.2652 1 14 1H2Z" fill="#64748B" />
              </svg>
            </div>
            <div class="flex-1">
              <p class="text-xs sm:text-sm text-gray-900">{{ profile.email }}</p>
            </div>
          </div>
          <div class="flex items-start gap-2 sm:gap-3" *ngIf="profile.phoneNumber">
            <div class="w-5 h-5 mt-0.5 flex-shrink-0">
              <svg class="w-4 h-4" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.65447 1.32805C3.59544 1.25211 3.52092 1.1896 3.43587 1.14468C3.35082 1.09975 3.25719 1.07343 3.16119 1.06747C3.06519 1.06151 2.96902 1.07605 2.87907 1.11012C2.78912 1.14418 2.70744 1.19699 2.63947 1.26505L1.60547 2.30005C1.12247 2.78405 0.944471 3.46905 1.15547 4.07005C2.0322 6.55716 3.45662 8.81546 5.32347 10.6781C7.18606 12.5449 9.44436 13.9693 11.9315 14.8461C12.5325 15.0571 13.2175 14.8791 13.7015 14.3961L14.7355 13.3621C14.8035 13.2941 14.8563 13.2124 14.8904 13.1225C14.9245 13.0325 14.939 12.9363 14.933 12.8403C14.9271 12.7443 14.9008 12.6507 14.8558 12.5656C14.8109 12.4806 14.7484 12.4061 14.6725 12.3471L12.3655 10.5531C12.2843 10.4903 12.1899 10.4467 12.0895 10.4255C11.989 10.4044 11.8851 10.4063 11.7855 10.4311L9.59547 10.9781C9.30313 11.0506 8.997 11.0465 8.70671 10.9661C8.41643 10.8857 8.15181 10.7317 7.93847 10.5191L5.48247 8.06205C5.26965 7.84881 5.11549 7.58424 5.0349 7.29395C4.95431 7.00366 4.95003 6.69748 5.02247 6.40505L5.57047 4.21505C5.59523 4.11544 5.59712 4.01151 5.57599 3.91106C5.55486 3.81061 5.51126 3.71625 5.44847 3.63505L3.65447 1.32805Z" fill="#64748B" />
              </svg>
            </div>
            <div class="flex-1">
              <p class="text-xs sm:text-sm text-gray-900">{{ profile.phoneNumber }}</p>
            </div>
          </div>
          <div class="flex items-start gap-2 sm:gap-3">
            <div class="w-5 h-5 mt-0.5 flex-shrink-0">
              <svg class="w-4 h-4" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 7C8.13261 7 8.25979 7.05268 8.35355 7.14645C8.44732 7.24021 8.5 7.36739 8.5 7.5V9H10C10.1326 9 10.2598 9.05268 10.3536 9.14645C10.4473 9.24021 10.5 9.36739 10.5 9.5C10.5 9.63261 10.4473 9.75979 10.3536 9.85355C10.2598 9.94732 10.1326 10 10 10H8.5V11.5C8.5 11.6326 8.44732 11.7598 8.35355 11.8536C8.25979 11.9473 8.13261 12 8 12C7.86739 12 7.74021 11.9473 7.64645 11.8536C7.55268 11.7598 7.5 11.6326 7.5 11.5V10H6C5.86739 10 5.74021 9.94732 5.64645 9.85355C5.55268 9.75979 5.5 9.63261 5.5 9.5C5.5 9.36739 5.55268 9.24021 5.64645 9.14645C5.74021 9.05268 5.86739 9 6 9H7.5V7.5C7.5 7.36739 7.55268 7.24021 7.64645 7.14645C7.74021 7.05268 7.86739 7 8 7Z" fill="#64748B" />
                <path d="M3.5 0C3.63261 0 3.75979 0.0526784 3.85355 0.146447C3.94732 0.240215 4 0.367392 4 0.5V1H12V0.5C12 0.367392 12.0527 0.240215 12.1464 0.146447C12.2402 0.0526784 12.3674 0 12.5 0C12.6326 0 12.7598 0.0526784 12.8536 0.146447C12.9473 0.240215 13 0.367392 13 0.5V1H14C14.5304 1 15.0391 1.21071 15.4142 1.58579C15.7893 1.96086 16 2.46957 16 3V14C16 14.5304 15.7893 15.0391 15.4142 15.4142C15.0391 15.7893 14.5304 16 14 16H2C1.46957 16 0.960859 15.7893 0.585786 15.4142C0.210714 15.0391 0 14.5304 0 14V3C0 2.46957 0.210714 1.96086 0.585786 1.58579C0.960859 1.21071 1.46957 1 2 1H3V0.5C3 0.367392 3.05268 0.240215 3.14645 0.146447C3.24021 0.0526784 3.36739 0 3.5 0Z" fill="#64748B" />
              </svg>
            </div>
            <div class="flex items-center justify-between w-full">
              <p class="text-xs sm:text-sm text-gray-900">{{ createdAtIndex }}</p>
              <p class="text-[10px] sm:text-xs text-gray-500">Date d'inscription</p>
            </div>
          </div>
          <div class="flex items-center pt-2">
            <div [class]="'w-6 h-3.5 rounded-full relative transition-colors ' + (profile.isActive ? 'bg-gradient-to-r from-[#FF6B00] to-[#FF914D]' : 'bg-gray-300')">
              <div class="w-2.5 h-2.5 bg-white rounded-full absolute top-0.5 shadow-md transition-all"
                [class.right-0.5]="profile.isActive"
                [class.left-0.5]="!profile.isActive"></div>
            </div>
            <span class="text-xs sm:text-sm text-gray-700 ml-2">Utilisateur {{ profile.isActive ? 'activé' : 'désactivé' }}</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2 sm:gap-3 px-4 sm:px-8 py-4 sm:py-6 border-t border-gray-100">
        <button (click)="back()"
          class="flex-1 py-2.5 sm:py-4 bg-gray-100 text-gray-600 hover:bg-gray-200 hover:text-gray-800 rounded-lg font-medium text-xs sm:text-base transition-colors">
          Retour
        </button>
      </div>
    </div>
  </div>
</app-main-layout>
