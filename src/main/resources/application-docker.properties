spring.application.name=coopachat
server.port=8082

spring.datasource.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:coopachat}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${DB_USER:coopachat}
spring.datasource.password=${DB_PASSWORD:coopachat}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.example.coopachat.controllers
springdoc.show-actuator=false

jwt.secret=${JWT_SECRET:coopachat-secret-key-256-bits-minimum-required-for-security-2025}
jwt.expiration=${JWT_EXPIRATION:86400000}
activation.code.expiration.minutes=${ACTIVATION_CODE_EXPIRATION_MINUTES:15}
activation.code.resend.cooldown.seconds=${ACTIVATION_CODE_RESEND_COOLDOWN_SECONDS:30}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}

mail.from=${MAIL_FROM:admincoopachat@yopmail.com}
mail.app.name=${MAIL_APP_NAME:CoopAchat}


# URLs frontend (redirections email)
app.frontend.base-url=${FRONTEND_BASE_URL:https://coopachat.innovimpactdev.cloud/}
app.backend.base-url=${BACKEND_BASE_URL:https://api.coopachat.innovimpactdev.cloud}

app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:https://coopachat.innovimpactdev.cloud/create-password?token=}
app.frontend.reset-password-url-mobile=${FRONTEND_RESET_PASSWORD_URL_MOBILE:https://coopachat.innovimpactdev.cloud/reset-password?token=}
app.frontend.activation-url=${FRONTEND_ACTIVATION_URL:https://coopachat.innovimpactdev.cloud/create-password?token=}
app.frontend.activation-url-mobile=${FRONTEND_ACTIVATION_URL_MOBILE:https://coopachat.innovimpactdev.cloud/set-password?token=}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}

# Configuration MinIO (variables depuis .env docker-compose)
minio.url=${MINIO_URL:}
minio.access-key=${MINIO_ACCESS_KEY:}
minio.secret-key=${MINIO_SECRET_KEY:}
minio.bucket=${MINIO_BUCKET:coop-achat}

# Hosted TouchPay (script sendPaymentInfos)
touchpay.hosted.script-url=${TOUCHPAY_HOSTED_SCRIPT_URL:https://touchpay.gutouch.net/touchpayv2/script/touchpaynr/prod_touchpay-0.0.1.js}
touchpay.agency-code=${TOUCHPAY_AGENCY_CODE:}
touchpay.token=${TOUCHPAY_TOKEN:}
touchpay.hosted.success-redirect-url=${TOUCHPAY_HOSTED_SUCCESS_REDIRECT_URL:}
touchpay.hosted.failed-redirect-url=${TOUCHPAY_HOSTED_FAILED_REDIRECT_URL:}
touchpay.hosted.default-city=${TOUCHPAY_HOSTED_DEFAULT_CITY:Dakar}
app.touchpay.bridge-url=${TOUCHPAY_BRIDGE_URL:https://coopachat.innovimpactdev.cloud/touchpay-bridge.html?orderId=%d&apiBaseUrl=https://api.coopachat.innovimpactdev.cloud}


touchpay.service-id=${TOUCHPAY_SERVICE_ID:}
touchpay.callback-url=${TOUCHPAY_CALLBACK_URL:}
