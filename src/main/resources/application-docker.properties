spring.application.name=coopachat
server.port=8082

spring.datasource.url=jdbc:mysql://db:3306/${DB_NAME:coopachat}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:coopachat}
spring.datasource.password=${DB_PASSWORD:coopachat}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.example.coopachat.controllers
springdoc.show-actuator=false

jwt.secret=${JWT_SECRET:coopachat-secret-key-256-bits-minimum-required-for-security-2025}
jwt.expiration=${JWT_EXPIRATION:86400000}
activation.code.expiration.minutes=${ACTIVATION_CODE_EXPIRATION_MINUTES:15}
activation.code.resend.cooldown.seconds=${ACTIVATION_CODE_RESEND_COOLDOWN_SECONDS:30}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}

mail.from=${MAIL_FROM:admincoopachat@yopmail.com}
mail.app.name=${MAIL_APP_NAME:CoopAchat}

app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:4200/reset-password?token=}
app.frontend.activate-employee-url=${FRONTEND_ACTIVATE_EMPLOYEE_URL:http://localhost:4200/activate?token=}

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:}

# Google Maps (Geocoding API, Places API) - adresses / autocomplete
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}

# Dossier des images (montĂŠ en volume Docker pour persister aprĂ¨s redĂŠmarrage)
app.files.dir=${APP_FILES_DIR:/var/coopachat/files}

sftp.host=${SFTP_HOST:}
sftp.port=${SFTP_PORT:22}
sftp.user=${SFTP_USER:}
sftp.password=${SFTP_PASSWORD:}
sftp.remote.dir=${SFTP_REMOTE_DIR:/coopacha/}
