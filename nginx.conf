events {

    worker_connections 1024;

}

http {

    include       /etc/nginx/mime.types;

    default_type  application/octet-stream;

    gzip on;

    server {

        listen 80;

        server_name localhost;

        root /usr/share/nginx/html;

        index index.csr.html;
      
      # Cache control pour l'index.csr.html pour éviter les problèmes de cache . Alors à chaque fois que l'on met à jour l'application, le cache ne sera pas utilisé et la nouvelle version sera chargée
        location = /index.csr.html {

            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

        }
 
        location / {

            try_files $uri /index.csr.html; 

        }
 
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {

            expires 1y;

            add_header Cache-Control "public, immutable";

        }
 
        location /health {

            return 200 "healthy\n";

        }

    }

}
 