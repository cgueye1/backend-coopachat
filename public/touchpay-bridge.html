<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoopAchat</title>
    
    <!-- Script TouchPay -->
    <script src="https://touchpay.gutouch.net/touchpayv2/script/touchpaynr/prod_touchpay-0.0.1.js" type="text/javascript"></script>


    <script type="text/javascript">
        // Variables globales pour stocker les données dynamiques
        let dynamicAmount = 0; //Montant de la commande
        let dynamicTransactionRef = ''; //Référence de la transaction
        let dynamicAgencyCode = ''; //Code de l'agence TouchPay 
        let dynamicServiceId = ''; //Service ID TouchPay
        let dynamicMerchantToken = ''; //Token/Hash TouchPay
        let dynamicEmail = ''; //Email du client
        let dynamicFirstName = ''; //Prénom du client
        let dynamicLastName = ''; //Nom du client
        let dynamicPhone = ''; //Téléphone du client
        let dynamicSuccessUrl = ''; //URL de redirection en cas de succès
        let dynamicFailedUrl = ''; //URL de redirection en cas d'échec

        // Fonction pour appeler TouchPay 
        function calltouchpay() {

           //si les données ne sont pas chargées, afficher une erreur et retourner
            if (!dynamicTransactionRef || dynamicAmount === 0) {
                alert("Erreur: Les informations de paiement ne sont pas encore chargées.");
                return;
            }

            //on appelle la fonction pour envoyer les informations de paiement à TouchPay 
            console.log("Appel TouchPay avec:", {
                ref: dynamicTransactionRef,
                agency: dynamicAgencyCode,
                token: dynamicMerchantToken,
                service: dynamicServiceId,
                amount: dynamicAmount,
                successUrl: dynamicSuccessUrl,
                failedUrl: dynamicFailedUrl
            });

            sendPaymentInfos(
                dynamicTransactionRef,
                dynamicAgencyCode,
                dynamicMerchantToken,
                dynamicServiceId,
                dynamicSuccessUrl,
                dynamicFailedUrl,
                dynamicAmount,
                'Dakar',
                dynamicEmail,
                dynamicFirstName,
                dynamicLastName,
                dynamicPhone
            );
        }

        // URL de l'API pour recupérer les données de paiement au niveau du back-office
        function getApiBaseUrl() {
            const params = new URLSearchParams(window.location.search);
            const apiBaseUrl = params.get('apiBaseUrl');
            return apiBaseUrl && apiBaseUrl.trim()
                ? apiBaseUrl.trim().replace(/\/+$/, '')
                : window.location.origin;
        }

        //fonction qui recupère l'ID de la commande
        function getOrderId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('orderId');
        }

        //fonction qui charge les données de paiement et pré-remplit le formulaire TouchPay
        async function loadPaymentData() {
            const orderId = getOrderId();
            const errorBox = document.getElementById('errorBox');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('btnContinuer');
             
            //si l'ID de la commande est manquant, afficher une erreur
            if (!orderId) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = 'Erreur : Paramètre ?orderId= manquant dans l\'URL.';
                return;
            }

            try {
                const apiBaseUrl = getApiBaseUrl();//URL de l'API pour recupérer les données de paiement

                //Construction de l'URL apiBaseURL/api/payments/bridge/orderId
                const url = `${apiBaseUrl}/api/payments/bridge/${encodeURIComponent(orderId)}`;
                
                //Headers pour la requête (plus de Bearer Token requis)
                const headers = { 'Accept': 'application/json' };

                //requête GET pour recupérer les données de paiement
                const res = await fetch(url, { method: 'GET', headers });
                const text = await res.text();
                
                //Si la réponse n'est pas OK, on affiche une erreur
                if (!res.ok) {
                    throw new Error(`Erreur serveur (${res.status}): ${text || res.statusText}`);
                }
                //sinon
                let payload; //Objet JSON contenant les données de paiement
                try {
                    payload = JSON.parse(text);//Conversion de la réponse en objet JSON
                } catch (e) {
                    throw new Error('Réponse invalide du serveur (JSON attendu).');
                }
                
                //variable qui contient les données de paiement
                const data = payload.data ? payload.data : payload;

                // On extrait la référence, le montant et les identifiants
                // On gère à la fois le camelCase (backend standard) et le snake_case (vu dans les logs)
                dynamicTransactionRef = String(data.transactionReference || data.order_number || '');
                dynamicAmount = Number(data.amount || data.total || 0);
                dynamicAgencyCode = String(data.agencyCode || data.agency_code || '');
                dynamicServiceId = String(data.serviceId || data.domaine_name || '');
                dynamicMerchantToken = String(data.merchantToken || data.hash || '');
                
                // Extraction des données client pour pré-remplir TouchPay
                dynamicEmail = data.customerEmail || data.customer_email || '';
                dynamicFirstName = data.customerFirstName || data.customer_first_name || '';
                dynamicLastName = data.customerLastName || data.customer_last_name || '';
                
                // Nettoyage du numéro de téléphone pour TouchPay (garder uniquement les chiffres)
                let rawPhone = data.customerPhone || data.customer_phone || '';
                if (rawPhone) {
                    dynamicPhone = String(rawPhone).replace(/[^\d+]/g, '');
                }

                dynamicSuccessUrl = data.successRedirectUrl || '';
                dynamicFailedUrl = data.failedRedirectUrl || '';

                // On cache le chargement et on affiche le bouton "continuer"
                loading.style.display = 'none';
                btn.style.display = 'inline-block'; //affichage du bouton "continuer" de la méthode calltouchpay

            } catch (error) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = `Erreur lors du chargement : ${error.message}`;
            }
        }

        // Charger les données dès l'ouverture de la page
        window.onload = () => {
            // Petit délai pour assurer le rendu
            setTimeout(loadPaymentData, 100);
        };
    </script>
</head>
<body>

    <div id="loading">Chargement des informations de paiement...</div>
    <div id="errorBox" style="display: none; color: red;"></div>

    <!-- Le bouton demandé -->
    <input type="button" id="btnContinuer" onclick="calltouchpay()" value="continuer" style="background-color: rgb(42, 83, 139); color: white; border-radius: 8px; height: 30px; border: none; cursor: pointer; padding: 0 20px; display: none;" />

</body>
</html>
